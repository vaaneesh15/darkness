<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="theme-color" content="#1c1c1e">
    <title>ChatX</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon_192.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; -webkit-touch-callout:none; }
        html { font-size:1.1rem; -webkit-text-size-adjust:100%; }
        html, body { height:100%; overflow:hidden; background:#121212; }
        body { color:#fff; font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; position:fixed; width:100%; }
        :root { --bg-page:#121212; --text-primary:#fff; --text-secondary:#8e8e93; --border-light:rgba(84,84,88,0.4); --accent-color:#6B9FFF; --input-bg:#1c1c1e; }
        button, .clickable { cursor:pointer; transition:all 0.05s ease; background:none; border:none; color:inherit; }
        button:active, .clickable:active { opacity:0.6; transform:scale(0.97); }
        .app-container { height:100%; display:flex; flex-direction:column; background:var(--bg-page); }
        .chat-header { display:flex; align-items:center; padding:0.8rem 1rem; background:var(--input-bg); border-bottom:1px solid var(--border-light); border-top:1px solid var(--border-light); }
        .chat-header span { font-weight:600; }
        .nick-editor { background:transparent; border:none; color:var(--accent-color); font-weight:600; font-size:1.1rem; outline:none; width:auto; min-width:50px; }
        .nick-editor:focus { border-bottom:1px solid var(--accent-color); }
        .chat-messages { flex:1; overflow-y:auto; padding:1rem; display:flex; flex-direction:column; gap:14px; }
        .message-item { display:flex; flex-direction:column; width:100%; position:relative; }
        .own-message .nick-main { color:var(--accent-color); }
        .nick-main { color:var(--accent-color); }
        .message-actions-btn { position:absolute; right:0; top:0; background:none; border:none; width:32px; height:32px; border-radius:16px; color:var(--text-secondary); }
        .message-actions-btn svg { width:20px; height:20px; fill:none; stroke:currentColor; stroke-width:2; }
        .reply-context { margin-bottom:8px; padding-left:10px; border-left:2px solid var(--accent-color); cursor:pointer; }
        .reply-context .reply-nick { font-size:0.8rem; color:var(--accent-color); }
        .reply-context .reply-text { font-size:0.85rem; color:var(--text-secondary); }
        .message-text { font-size:1rem; line-height:1.4; color:var(--text-primary); white-space:pre-wrap; word-break:break-word; }
        .message-text.highlight { color:var(--accent-color)!important; }
        .message-text a { color:var(--accent-color); text-decoration:underline; }
        .message-footer { display:flex; align-items:center; gap:12px; margin-top:8px; flex-wrap:wrap; justify-content:flex-end; }
        .timestamp { font-size:0.75rem; color:var(--text-secondary); }
        .edited-badge { font-size:0.75rem; color:var(--text-secondary); margin-left:4px; }
        .date-divider { text-align:center; margin:1rem 0; color:var(--text-secondary); font-size:0.8rem; }
        .typing-indicator { background:var(--input-bg); border-top:1px solid var(--border-light); padding:0.5rem 1rem; font-size:0.8rem; color:var(--text-secondary); }
        .typing-indicator.hidden { display:none; }
        .input-wrapper { background:var(--input-bg); border-top:1px solid var(--border-light); padding-bottom:env(safe-area-inset-bottom,0); }
        .input-row { display:flex; gap:14px; align-items:center; padding:1rem 1rem; }
        .input-row textarea { flex:1; background:transparent; border:none; padding:0.8rem 0; font-size:1rem; color:var(--text-primary); outline:none; resize:none; max-height:150px; }
        .send-btn { background:var(--accent-color); border:none; width:2.8rem; height:2.8rem; border-radius:2rem; color:white; font-size:1.4rem; display:flex; align-items:center; justify-content:center; }
        .attach-btn { background:none; border:none; color:var(--text-secondary); width:2.5rem; height:2.5rem; display:flex; align-items:center; justify-content:center; }
        .attach-btn svg { width:1.5rem; height:1.5rem; stroke:currentColor; stroke-width:1.5; fill:none; }
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; z-index:10000; justify-content:center; align-items:center; }
        .modal-overlay { position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); backdrop-filter:blur(12px); }
        .modal-container { position:relative; z-index:10001; width:90%; max-width:380px; max-height:90%; overflow-y:auto; }
        .modal-content { background:var(--input-bg); border-radius:2rem; padding:1.8rem; border:0.5px solid var(--border-light); }
        .modal-content h3 { margin-bottom:1.2rem; font-size:1.4rem; font-weight:590; text-align:center; }
        .modal-buttons { display:flex; gap:12px; margin-top:1.5rem; }
        .modal-buttons button { flex:1; padding:0.8rem; border-radius:1rem; font-weight:590; border:1px solid var(--border-light); background:var(--bg-page); color:var(--text-primary); }
        .context-menu-buttons { display:flex; flex-direction:column; gap:0.8rem; margin-top:1rem; }
        .context-menu-buttons button { background:var(--bg-page); border:1px solid var(--border-light); padding:0.8rem 1rem; border-radius:1rem; color:var(--text-primary); display:flex; align-items:center; gap:16px; }
        .context-menu-buttons button svg { width:1.5rem; height:1.5rem; stroke:currentColor; stroke-width:1.5; fill:none; }
        .file-message { display:flex; align-items:center; gap:12px; padding:8px 0; }
        .file-icon { width:40px; height:40px; background:var(--input-bg); border-radius:8px; display:flex; align-items:center; justify-content:center; }
        .file-info { flex:1; }
        .file-name { font-weight:500; }
        .file-size { font-size:0.8rem; color:var(--text-secondary); }
        .open-file-btn { background:var(--accent-color); border:none; padding:0.4rem 1rem; border-radius:1rem; color:white; }
        .reply-indicator, .edit-indicator { margin:0.5rem 1rem 0; background:var(--input-bg); border-left:2px solid var(--accent-color); display:flex; align-items:center; justify-content:space-between; padding:0.5rem 0.8rem; }
        .cancel-reply, .cancel-edit { background:var(--bg-page); border:none; width:2.2rem; height:2.2rem; border-radius:1rem; font-size:1.3rem; }
    </style>
</head>
<body>
<div id="appContainer" class="app-container">
    <div class="chat-header">
        <span>ChatX — </span>
        <input type="text" id="nickInput" class="nick-editor" value="Гость" maxlength="20">
    </div>
    <div class="chat-messages" id="messagesContainer"></div>
    <div class="typing-indicator hidden" id="typingIndicator"></div>
    <div class="input-wrapper">
        <div class="input-row">
            <button class="attach-btn" id="attachBtn"><svg viewBox="0 0 24 24"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg></button>
            <textarea id="messageInput" placeholder="Сообщение..." rows="1"></textarea>
            <button class="send-btn" id="sendBtn">↑</button>
        </div>
    </div>
</div>
<!-- модалки -->
<div id="confirmModal" class="modal"><div class="modal-overlay"></div><div class="modal-container"><div class="modal-content"><h3 id="confirmTitle">Подтверждение</h3><p id="confirmMessage"></p><div class="modal-buttons"><button id="confirmCancelBtn">Отмена</button><button id="confirmOkBtn">OK</button></div></div></div></div>
<div id="contextMenuModal" class="modal"><div class="modal-overlay"></div><div class="modal-container"><div class="modal-content"><div id="contextMessageNick"></div><div id="contextMessagePreview"></div><div class="context-menu-buttons" id="contextMenuButtons"></div></div></div></div>
<script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
<script>
(function(){function a(e){const t=e.target.closest?.('button, .clickable');if(t)t.classList.add('tapped');}function r(e){const t=e.target.closest?.('button, .clickable');if(t)t.classList.remove('tapped');}document.addEventListener('touchstart',a,{passive:true});document.addEventListener('touchend',r);document.addEventListener('touchcancel',r);document.addEventListener('mousedown',a);document.addEventListener('mouseup',r);document.addEventListener('mouseleave',r);})();
document.addEventListener('DOMContentLoaded',function(){
function $(id){return document.getElementById(id);}
let socket=null,currentUser={nick:"Гость"},messages=[],currentChatId=null,editingMessage=null,pendingDeleteMessageId=null,replyingTo=null,typingTimeout=null;
let savedNick=localStorage.getItem('chat_nick');if(savedNick){currentUser.nick=savedNick;$('nickInput').value=savedNick;}
$('nickInput').addEventListener('change',function(){let newNick=this.value.trim();if(newNick&&newNick!==currentUser.nick){currentUser.nick=newNick;localStorage.setItem('chat_nick',newNick);}});
function showModal(id){let m=$(id);if(!m)return;m.style.display='flex';}
function hideModal(id){let m=$(id);if(!m)return;m.style.display='none';}
function showConfirm(msg,onOk,title='Подтверждение'){$('confirmTitle').innerText=title;$('confirmMessage').innerText=msg;showModal('confirmModal');$('confirmOkBtn').onclick=()=>{hideModal('confirmModal');if(onOk)onOk();};$('confirmCancelBtn').onclick=()=>hideModal('confirmModal');}
function escapeHtml(s){return s.replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]);}
function linkify(t){return t.replace(/(https?:\/\/[^\s]+)/g,u=>`<a href="${u}" target="_blank" style="color:var(--accent-color);">${u}</a>`);}
function formatTime(iso){let d=new Date(iso);return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}
function formatDate(iso){let d=new Date(iso);return String(d.getDate()).padStart(2,'0')+'.'+String(d.getMonth()+1).padStart(2,'0')+'.'+d.getFullYear();}
function isSameDay(d1,d2){return d1.getFullYear()===d2.getFullYear()&&d1.getMonth()===d2.getMonth()&&d1.getDate()===d2.getDate();}
function formatFileSize(b){return b<1024?b+' B':b<1048576?(b/1024).toFixed(1)+' KB':(b/1048576).toFixed(1)+' MB';}
function truncateFileName(n){let d=n.lastIndexOf('.');if(d===-1)return n.length>16?n.slice(0,14)+'…':n;let e=n.slice(d),b=n.slice(0,d);if(b.length>14)return b.slice(0,14)+'…'+e;return n;}
async function initChat(){try{let r=await fetch('/public-chat-id');let d=await r.json();currentChatId=d.chatId;socket.emit('join chat',currentChatId);await loadMessages();renderMessages();}catch(e){}}
async function loadMessages(){if(!currentChatId)return;try{let r=await fetch(`/chat-messages?chat_id=${currentChatId}&nick=${encodeURIComponent(currentUser.nick)}`);messages=await r.json();}catch(e){}}
function renderMessages(){let c=$('messagesContainer');c.innerHTML='';let lastDate=null;messages.forEach((m,i)=>{let msgDate=new Date(m.created_at);if(i===0||!isSameDay(msgDate,lastDate)){let div=document.createElement('div');div.className='date-divider';div.innerText=formatDate(m.created_at);c.appendChild(div);lastDate=msgDate;}let own=m.nick===currentUser.nick;let d=document.createElement('div');d.className='message-item'+(own?' own-message':'');d.dataset.id=m.id;d.dataset.nick=m.nick;let reply='';if(m.reply_to_id&&m.reply_nick)reply=`<div class="reply-context" data-message="${m.reply_to_id}"><div class="reply-nick">${escapeHtml(m.reply_nick)}</div><div class="reply-text">${escapeHtml(m.reply_text||'')}</div></div>`;let timeStr=formatTime(m.created_at);let content='';if(m.type==='file'||m.type==='media'){let dn=truncateFileName(m.file_name);content=`<div class="file-message"><div class="file-icon">📎</div><div class="file-info"><div class="file-name">${escapeHtml(dn)}</div><div class="file-size">${formatFileSize(m.file_size)}</div></div><button class="open-file-btn" data-url="${m.file_url}">Открыть</button></div>`;}else content=`<div class="message-text">${linkify(escapeHtml(m.text||''))}</div>`;let header=`<div class="message-header"><div class="message-nick"><span class="nick-main">${escapeHtml(m.nick)}</span></div></div>`;d.innerHTML=`${header}${reply}${content}<div class="message-footer"><div class="footer-right"><span class="timestamp">${timeStr}</span>${m.edited?' <span class="edited-badge">ред.</span>':''}</div></div>`;c.appendChild(d);let act=document.createElement('button');act.className='message-actions-btn';act.innerHTML='<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="19" r="1.5"/></svg>';act.onclick=e=>{e.stopPropagation();showContextMenu(m,own);};d.appendChild(act);});attachFileButtons();document.querySelectorAll('.reply-context').forEach(el=>el.addEventListener('click',()=>scrollToMessage(+el.dataset.message)));c.scrollTop=c.scrollHeight;}
function attachFileButtons(){document.querySelectorAll('.open-file-btn').forEach(b=>b.onclick=()=>window.open(b.dataset.url,'_blank'));}
function showContextMenu(msg,own){let isMedia=msg.type==='file'||msg.type==='media';$('contextMessageNick').innerHTML=escapeHtml(msg.nick);$('contextMessagePreview').innerHTML=isMedia?`📎 ${msg.file_name}`:linkify(escapeHtml((msg.text||'').slice(0,150)))+((msg.text||'').length>150?'…':'');let c=$('contextMenuButtons');let h=`<button id="ctx-reply"><svg viewBox="0 0 24 24"><path d="M3 10h10a8 8 0 0 1 8 8v2M3 10l6 6M3 10l6-6"/></svg>Ответить</button>`;if(!isMedia&&own)h+=`<button id="ctx-edit"><svg viewBox="0 0 24 24"><path d="M17 3l4 4-7 7H10v-4l7-7z"/><path d="M4 20h16"/></svg>Редактировать</button>`;h+=`<button id="ctx-copy"><svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>Скопировать</button>`;if(own)h+=`<button id="ctx-delete"><svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>Удалить</button>`;h+=`<button id="ctx-close"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>Закрыть</button>`;c.innerHTML=h;showModal('contextMenuModal');$('ctx-reply').onclick=()=>{if(editingMessage){editingMessage=null;hideEditIndicator();}replyingTo={messageId:msg.id,nick:msg.nick,text:msg.text};showReplyIndicator(replyingTo);hideModal('contextMenuModal');$('messageInput').focus();};if(!isMedia&&own)$('ctx-edit').onclick=()=>{if(replyingTo){replyingTo=null;hideReplyIndicator();}editingMessage={id:msg.id,text:msg.text};showEditIndicator(editingMessage);let inp=$('messageInput');inp.value=msg.text;inp.focus();hideModal('contextMenuModal');};$('ctx-copy').onclick=()=>{navigator.clipboard.writeText(isMedia?msg.file_name:msg.text);hideModal('contextMenuModal');};if(own)$('ctx-delete').onclick=()=>{pendingDeleteMessageId=msg.id;showConfirm('Удалить сообщение?',async()=>{await fetch('/delete-message',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messageId:pendingDeleteMessageId,nick:currentUser.nick})});pendingDeleteMessageId=null;});hideModal('contextMenuModal');};$('ctx-close').onclick=()=>hideModal('contextMenuModal');}
function showReplyIndicator(r){let i=$('replyIndicator');if(!i){i=document.createElement('div');i.id='replyIndicator';i.className='reply-indicator';i.innerHTML=`<div class="reply-content"><div class="reply-nick"></div><div class="reply-text"></div></div><button class="cancel-reply">✕</button>`;document.querySelector('.input-wrapper').before(i);i.querySelector('.cancel-reply').onclick=()=>{replyingTo=null;i.style.display='none';};}i.querySelector('.reply-nick').innerHTML=escapeHtml(r.nick);i.querySelector('.reply-text').innerHTML=escapeHtml(r.text);i.style.display='flex';}
function hideReplyIndicator(){let i=$('replyIndicator');if(i)i.style.display='none';}
function showEditIndicator(e){let i=$('editIndicator');if(!i){i=document.createElement('div');i.id='editIndicator';i.className='edit-indicator';i.innerHTML=`<div class="edit-content"><div class="edit-label">Редактирование</div><div class="edit-text"></div></div><button class="cancel-edit">✕</button>`;document.querySelector('.input-wrapper').before(i);i.querySelector('.cancel-edit').onclick=()=>{editingMessage=null;i.style.display='none';$('messageInput').value='';};}i.querySelector('.edit-text').innerHTML=escapeHtml(e.text);i.style.display='flex';}
function hideEditIndicator(){let i=$('editIndicator');if(i)i.style.display='none';}
function updateTypingIndicator(d){let i=$('typingIndicator');if(!i)return;if(!d||d.nick===currentUser.nick)i.classList.add('hidden');else{i.innerHTML=`${escapeHtml(d.nick)} печатает...`;i.classList.remove('hidden');clearTimeout(window.typeHide);window.typeHide=setTimeout(()=>i.classList.add('hidden'),2000);}}
function onTyping(is){if(!socket||!currentChatId)return;if(is){socket.emit('typing',{chatId:currentChatId,nick:currentUser.nick});clearTimeout(typingTimeout);typingTimeout=setTimeout(()=>socket.emit('stop typing',{chatId:currentChatId}),1500);}else{clearTimeout(typingTimeout);socket.emit('stop typing',{chatId:currentChatId});}}
function scrollToMessage(id){let el=document.querySelector(`.message-item[data-id="${id}"] .message-text`);if(el){el.scrollIntoView({behavior:'smooth',block:'center'});el.classList.add('highlight');setTimeout(()=>el.classList.remove('highlight'),4000);}}
function autoResize(ta){ta.style.height='auto';ta.style.height=Math.min(ta.scrollHeight,150)+'px';}
function sendMessage(){let inp=$('messageInput'),text=inp.value.trim();if(!text&&!replyingTo&&!editingMessage)return;if(!currentChatId)return;if(editingMessage){editMessage(editingMessage.id,text);editingMessage=null;inp.value='';autoResize(inp);hideEditIndicator();inp.focus();return;}fetch('/chat-message',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({chat_id:currentChatId,nick:currentUser.nick,text,reply_to_id:replyingTo?.messageId,type:'text'})}).then(()=>{replyingTo=null;hideReplyIndicator();inp.value='';autoResize(inp);onTyping(false);inp.focus();});}
async function editMessage(id,newText){await fetch('/edit-message',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messageId:id,nick:currentUser.nick,newText})});}
$('attachBtn').onclick=()=>{let i=document.createElement('input');i.type='file';i.accept='*/*';i.onchange=async e=>{let f=e.target.files[0];if(!f)return;let fd=new FormData();fd.append('file',f);let r=await fetch('/upload',{method:'POST',body:fd}),d=await r.json();if(d.success){let type=(f.type.startsWith('image/')||f.type.startsWith('video/'))?'media':'file';fetch('/chat-message',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({chat_id:currentChatId,nick:currentUser.nick,type,file_url:'/uploads/'+d.file.filename,file_name:f.name,file_size:f.size})});}};i.click();};
async function initializeApp(){await initChat();socket.on('chat message received',newMsg=>{if(currentChatId===newMsg.chat_id){messages.push(newMsg);renderMessages();}});socket.on('message deleted',id=>{messages=messages.filter(m=>m.id!==id);renderMessages();});socket.on('message edited',({messageId,newText})=>{let m=messages.find(m=>m.id===messageId);if(m){m.text=newText;m.edited=true;renderMessages();}});socket.on('user typing',d=>{if(d.chatId===currentChatId)updateTypingIndicator(d);});socket.on('user stop typing',d=>{if(d.chatId===currentChatId)updateTypingIndicator(null);});}
function bindUI(){$('sendBtn').onclick=sendMessage;let inp=$('messageInput');inp.addEventListener('input',()=>{autoResize(inp);onTyping(true);});}
socket=io();socket.emit('user online',currentUser.nick);bindUI();await initializeApp();
});
</script>
</body>
</html>
