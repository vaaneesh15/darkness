<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Dark Maze: Stealth Escape</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { border: 2px solid #333; }
        #ui { position: absolute; top: 10px; left: 10px; color: #fff; font-family: sans-serif; pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui">
        Заряд фонарика: <span id="battery">100</span>%<br>
        Найдите <span style="color: gold;">КЛЮЧ</span> и доберитесь до <span style="color: #0f0;">ВЫХОДА</span><br>
        Shift - присесть (увеличивает обзор, замедляет)
    </div>
    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const batteryEl = document.getElementById('battery');

canvas.width = 800;
canvas.height = 600;

const tileSize = 40;
const cols = canvas.width / tileSize;
const rows = canvas.height / tileSize;

// Карта (0 - пол, 1 - стена)
let map = [];
function generateMap() {
    for (let y = 0; y < rows; y++) {
        map[y] = [];
        for (let x = 0; x < cols; x++) {
            // Края всегда стены, внутри — случайный шум
            if (x === 0 || x === cols - 1 || y === 0 || y === rows - 1) {
                map[y][x] = 1;
            } else {
                map[y][x] = Math.random() < 0.2 ? 1 : 0;
            }
        }
    }
    // Очищаем место старта игрока
    map[1][1] = 0;
    map[1][2] = 0;
    map[2][1] = 0;
}

const player = {
    x: 60,
    y: 60,
    radius: 12,
    speed: 3,
    battery: 100,
    isCrouching: false,
    hasKey: false
};

const key = { x: 0, y: 0 };
const exit = { x: 0, y: 0 };
const enemy = { x: 400, y: 300, radius: 15, speed: 1.5 };

function initPositions() {
    // Случайная позиция ключа на свободном месте
    do {
        key.x = Math.floor(Math.random() * (cols - 2) + 1) * tileSize + tileSize / 2;
        key.y = Math.floor(Math.random() * (rows - 2) + 1) * tileSize + tileSize / 2;
    } while (map[Math.floor(key.y / tileSize)][Math.floor(key.x / tileSize)] === 1);

    // Случайная позиция выхода
    do {
        exit.x = (cols - 2) * tileSize;
        exit.y = (rows - 2) * tileSize;
    } while (map[Math.floor(exit.y / tileSize)][Math.floor(exit.x / tileSize)] === 1);
}

const keys = {};
window.onkeydown = (e) => keys[e.code] = true;
window.onkeyup = (e) => keys[e.code] = false;

function checkCollision(newX, newY) {
    const gridX = Math.floor(newX / tileSize);
    const gridY = Math.floor(newY / tileSize);
    return map[gridY][gridX] === 1;
}

function update() {
    player.isCrouching = keys['ShiftLeft'] || keys['ShiftRight'];
    let currentSpeed = player.isCrouching ? player.speed * 0.5 : player.speed;
    
    let nextX = player.x;
    let nextY = player.y;

    if (keys['KeyW']) nextY -= currentSpeed;
    if (keys['KeyS']) nextY += currentSpeed;
    if (keys['KeyA']) nextX -= currentSpeed;
    if (keys['KeyD']) nextX += currentSpeed;

    // Коллизии по осям для плавного скольжения
    if (!checkCollision(nextX, player.y)) player.x = nextX;
    if (!checkCollision(player.x, nextY)) player.y = nextY;

    // Батарейка
    if (player.battery > 0) {
        player.battery -= 0.05;
        batteryEl.innerText = Math.ceil(player.battery);
    }

    // Логика врага (простое преследование)
    const dx = player.x - enemy.x;
    const dy = player.y - enemy.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    
    // Если игрок крадется, монстр видит его только вблизи
    const detectRange = player.isCrouching ? 150 : 300;
    
    if (dist < detectRange) {
        enemy.x += (dx / dist) * enemy.speed;
        enemy.y += (dy / dist) * enemy.speed;
    }

    // Проверка ключа
    const distToKey = Math.sqrt((player.x - key.x)**2 + (player.y - key.y)**2);
    if (distToKey < 20) player.hasKey = true;

    // Смерть
    if (dist < 20) {
        alert("Монстр поймал вас!");
        location.reload();
    }

    // Победа
    if (player.hasKey && player.x > exit.x && player.y > exit.y) {
        alert("Вы сбежали!");
        location.reload();
    }
}

function draw() {
    // 1. Фон (полная тьма)
    ctx.fillStyle = '#050505';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // 2. Зона видимости (фонарик)
    const visionRadius = player.battery > 0 ? (player.isCrouching ? 160 : 100) : 40;
    
    ctx.save();
    ctx.beginPath();
    ctx.arc(player.x, player.y, visionRadius, 0, Math.PI * 2);
    ctx.clip();
    
    // Отрисовка пола внутри света
    ctx.fillStyle = '#111';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Отрисовка стен в зоне света
    ctx.fillStyle = '#222';
    for (let y = 0; y < rows; y++) {
        for (let x = 0; x < cols; x++) {
            if (map[y][x] === 1) {
                ctx.fillRect(x * tileSize, y * tileSize, tileSize, tileSize);
                ctx.strokeStyle = '#333';
                ctx.strokeRect(x * tileSize, y * tileSize, tileSize, tileSize);
            }
        }
    }

    // Ключ
    if (!player.hasKey) {
        ctx.fillStyle = 'gold';
        ctx.shadowBlur = 10;
        ctx.shadowColor = 'gold';
        ctx.fillRect(key.x - 5, key.y - 5, 10, 10);
    }

    // Выход
    if (player.hasKey) {
        ctx.fillStyle = '#0f0';
        ctx.fillRect(exit.x + 5, exit.y + 5, 30, 30);
    }
    
    ctx.restore();

    // 3. Отрисовка игрока (всегда виден)
    ctx.fillStyle = player.isCrouching ? '#55f' : '#00f';
    ctx.beginPath();
    ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
    ctx.fill();

    // 4. Отрисовка врага (виден только если он в радиусе света)
    const distToEnemy = Math.sqrt((player.x - enemy.x)**2 + (player.y - enemy.y)**2);
    if (distToEnemy < visionRadius) {
        ctx.fillStyle = 'red';
        ctx.beginPath();
        ctx.arc(enemy.x, enemy.y, enemy.radius, 0, Math.PI * 2);
        ctx.fill();
    }
}

function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

generateMap();
initPositions();
gameLoop();
</script>
</body>
</html>
